<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>MyShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to MyShop</h2>
        <p>Best products at affordable prices</p>
        <button>Shop Now</button>
    </section>

    <!-- Products Section -->
    <section class="products">
        <h2>Our Products</h2>

        <div class="product-container">

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Tops">
                <h3>Product 1</h3>
                <p class="price">999</p>
                <button onclick="addToCart(999)">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Jeans">
                <h3>Product 2</h3>
                <p class="price">1499</p>
                <button onclick="addToCart(1499)">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Dress">
                <h3>Product 3</h3>
                <p class="price">1999</p>
                <button onclick="addToCart(1999)">Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Cart Summary -->
    <section class="cart-summary">
        <h2>Cart Summary</h2>
        <p>Total Items: <span id="total-items">0</span></p>
        <p>Total Price: ₹<span id="total-price">0</span></p>
    </section>

    <footer>
        <p>© 2026 MyShop | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
